name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR
        run: mvn -B package --no-transfer-progress

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: soap-arithmetics
          path: target/soap-arithmetics-1.0.0.jar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: soap-arithmetics

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 167.172.189.61 >> ~/.ssh/known_hosts

      - name: Copy JAR to server
        run: |
          scp -i ~/.ssh/deploy_key soap-arithmetics-1.0.0.jar \
            root@167.172.189.61:/opt/arithmetics/soap-arithmetics.jar

      - name: Restart service and verify
        run: |
          ssh -i ~/.ssh/deploy_key root@167.172.189.61 \
            'chown arithmetic-user:arithmetic-user /opt/arithmetics/soap-arithmetics.jar \
             && systemctl restart arithmetics \
             && sleep 8 \
             && curl -sf http://localhost:8081/health'
